# =============================================================================
# beats.conf — Logstash Pipeline: homelab-elk-soc
# =============================================================================
# Purpose: Receives logs from Winlogbeat, Filebeat, and Auditbeat on port 5044,
#          applies source tags for downstream filtering, and forwards to
#          Elasticsearch.
#
# Credentials are passed via environment variables — do not hardcode passwords.
# Set ES_USER and ES_PASSWORD in the Logstash service environment before starting.
#
# Example (Linux — add to /etc/default/logstash or /etc/logstash/startup.options):
#   ES_USER=elastic
#   ES_PASSWORD=your_password_here
# =============================================================================

# -----------------------------------------------------------------------------
# INPUT: Accept Beats protocol on port 5044
# -----------------------------------------------------------------------------
input {
  beats {
    port => 5044
  }
}

# -----------------------------------------------------------------------------
# FILTER: Tag events by source Beat agent type
# Adds metadata tags used for routing, filtering, and dashboard queries.
# -----------------------------------------------------------------------------
filter {

  # Windows endpoint — Winlogbeat
  if [agent][type] == "winlogbeat" {
    mutate {
      add_tag => ["windows", "winlogbeat"]
    }
  }

  # Linux endpoint — Filebeat (system logs + OPNsense syslog relay)
  if [agent][type] == "filebeat" {
    mutate {
      add_tag => ["linux", "filebeat"]
    }

    # OPNsense syslog arrives via Filebeat on LINUX-ENDPOINT.
    # OPNsense uses syslog facility local0 by default.
    # Tag firewall events separately for dashboard and rule filtering.
    if [log][syslog][facility][name] == "local0" or [syslog][facility_label] == "local0" {
      mutate {
        add_tag => ["opnsense", "firewall"]
        add_field => { "event_source" => "opnsense" }
      }
    }
  }

  # Linux endpoint — Auditbeat (file integrity, auditd)
  if [agent][type] == "auditbeat" {
    mutate {
      add_tag => ["linux", "auditbeat"]
    }
  }

}

# -----------------------------------------------------------------------------
# OUTPUT: Forward to Elasticsearch
# -----------------------------------------------------------------------------
output {
  elasticsearch {
    hosts => ["https://localhost:9200"]

    # Use environment variables for credentials — never hardcode passwords.
    user     => "${ES_USER}"
    password => "${ES_PASSWORD}"

    # ---------------------------------------------------------------------
    # TLS / SSL Configuration
    # ---------------------------------------------------------------------
    # LAB ONLY — ssl_verification_mode "none" disables certificate validation.
    # This is acceptable in a closed RFC1918 lab network with no sensitive data.
    # DO NOT use in production — it leaves the pipeline open to MITM attacks.
    ssl_verification_mode => "none"

    # PRODUCTION — Comment out ssl_verification_mode above and use CA validation:
    # ssl_certificate_authorities => ["/etc/logstash/certs/http_ca.crt"]
    # The CA cert is generated by Elasticsearch during initial setup.
    # Copy it from the ELK-SIEM: /etc/elasticsearch/certs/http_ca.crt

    # ---------------------------------------------------------------------
    # Index naming — preserves standard Elastic Beat index conventions
    # e.g., winlogbeat-8.19.13-2026.04.29, filebeat-8.x-2026.04.29
    # ---------------------------------------------------------------------
    index => "%{[@metadata][beat]}-%{[@metadata][version]}-%{+YYYY.MM.dd}"
  }
}
